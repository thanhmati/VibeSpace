<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VibeSpace - Focus Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#ffdad6",
                        "primary-fixed-dim": "#4de082",
                        "glass-surface": "rgba(15, 23, 42, 0.45)",
                        "surface-container-highest": "#2f372f",
                        "secondary": "#c4c7cb",
                        "surface-container": "#1a211b",
                        "on-tertiary-fixed-variant": "#6c3a0f",
                        "outline": "#869486",
                        "whisper-border": "rgba(255, 255, 255, 0.08)",
                        "tertiary-fixed": "#ffdcc6",
                        "outline-variant": "#3d4a3e",
                        "on-primary": "#003919",
                        "primary-fixed": "#6dfe9c",
                        "tertiary-container": "#ffb47f",
                        "primary-container": "#4ade80",
                        "text-primary": "#f8fafc",
                        "surface-container-lowest": "#09100a",
                        "background": "#0e150f",
                        "on-primary-fixed-variant": "#005227",
                        "tertiary": "#ffd9c1",
                        "on-secondary": "#2d3134",
                        "inverse-on-surface": "#2b322b",
                        "on-surface-variant": "#bccabb",
                        "error": "#ffb4ab",
                        "on-primary-container": "#005e2d",
                        "inverse-primary": "#006d36",
                        "surface-dim": "#0e150f",
                        "secondary-container": "#43474b",
                        "surface-variant": "#2f372f",
                        "surface-container-high": "#242c25",
                        "on-background": "#dde5da",
                        "on-tertiary-fixed": "#301400",
                        "surface-bright": "#333b34",
                        "on-tertiary-container": "#794418",
                        "on-secondary-container": "#b2b5ba",
                        "on-secondary-fixed-variant": "#43474b",
                        "secondary-fixed-dim": "#c4c7cb",
                        "on-surface": "#dde5da",
                        "primary": "#6bfb9a",
                        "active-glow": "rgba(74, 222, 128, 0.15)",
                        "text-secondary": "#94a3b8",
                        "surface-container-low": "#161d17",
                        "inverse-surface": "#dde5da",
                        "tertiary-fixed-dim": "#ffb784",
                        "on-tertiary": "#4f2500",
                        "error-container": "#93000a",
                        "secondary-fixed": "#e0e3e7",
                        "on-secondary-fixed": "#181c1f",
                        "canvas-base": "#090d10",
                        "surface": "#0e150f",
                        "on-primary-fixed": "#00210c",
                        "surface-tint": "#4de082",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "inner-padding": "1.5rem",
                        "fab-size": "48px",
                        "container-todo": "400px",
                        "section-gap": "2rem",
                        "container-music": "360px"
                    },
                    "fontFamily": {
                        "h2": ["Outfit"],
                        "label-sm": ["Outfit"],
                        "display-timer": ["JetBrains Mono"],
                        "mono-label": ["JetBrains Mono"],
                        "display-timer-mobile": ["JetBrains Mono"],
                        "body-lg": ["Outfit"],
                        "h1": ["Outfit"],
                        "body-md": ["Outfit"]
                    },
                    "fontSize": {
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "label-sm": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display-timer": ["80px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "500" }],
                        "mono-label": ["12px", { "lineHeight": "1", "fontWeight": "400" }],
                        "display-timer-mobile": ["48px", { "lineHeight": "1", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["32px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        
        .timer-ring-active {
            animation: pulse-ring 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .spring-transition {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
    </style>
</head>
<body class="bg-background text-text-primary min-h-screen overflow-hidden font-body-md relative selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Image Layer -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center bg-no-repeat" data-alt="A serene, deep green pine forest enveloped in heavy, atmospheric mist. The mood is calm, solitary, and meditative, fitting a minimalist Zen focus aesthetic. Soft, natural light filters through the dense canopy, emphasizing a rich palette of dark emeralds and muted teals. The composition is expansive and airy, providing a peaceful backdrop for deep concentration." style="background-image: url('https://lh3.googleusercontent.com/aida/AP1WRLtk7JyIKn0jarZVchY_jsopYEOD3rNWobD2WTdmrKSAy26ql5_YkvXJOkxo4mHg5le-hOG5LOnuBptGp7ryUFKyVEcen_VgTg90TU3XEIjtzD07Yqdgdbpe-_FQq5R5JDAn6WGR7yYOwYCzVyYofsHkSl4Ighy_m3OiNwWrAO2aIMj24IMDNSVBgVoKo6PKqK9w4EXUOfUs3zt86gArfI5G4Eyk047IJj69ES3PUpHW0yd2yFoGNPEwOQ')"></div>
<!-- Subtle dark overlay to ensure text legibility -->
<div class="absolute inset-0 bg-black/30 backdrop-blur-[2px]"></div>
</div>
<!-- TopAppBar -->
<nav class="bg-transparent docked full-width top-0 no-border flex justify-between items-center w-full px-inner-padding py-6 absolute z-50">
<div class="flex items-center gap-4">
<span class="font-h1 text-h1 text-primary tracking-tight">VibeSpace</span>
</div>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 p-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200 p-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">forest</span>
</button>
</div>
</nav>
<!-- Main Canvas (Centered Timer) -->
<main class="relative z-10 w-full h-screen flex flex-col items-center justify-center">
<!-- Pomodoro Container -->
<div class="relative flex items-center justify-center w-80 h-80 md:w-96 md:h-96">
<!-- Progress Ring Background -->
<svg class="absolute inset-0 w-full h-full -rotate-90 pointer-events-none" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="48" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2"></circle>
<!-- Progress Ring Active (Mint) -->
<circle class="timer-ring-active" cx="50" cy="50" fill="none" r="48" stroke="#4ade80" stroke-dasharray="301.59" stroke-dashoffset="0" stroke-linecap="round" stroke-width="2"></circle>
</svg>
<!-- Timer Display -->
<div class="flex flex-col items-center z-10">
<div class="font-display-timer-mobile md:font-display-timer text-display-timer-mobile md:text-display-timer text-text-primary tracking-tight" id="main-timer">25:00</div>
<div class="font-mono-label text-mono-label text-primary-container/80 mt-2 tracking-widest uppercase">Focus Session</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 z-50 flex justify-center pb-8 pointer-events-none">
<div class="bg-glass-surface rounded-full mb-8 mx-auto w-fit backdrop-blur-3xl border border-whisper-border shadow-2xl flex items-center p-2 gap-2 pointer-events-auto">
<!-- Timer (Active) -->
<button aria-label="Timer" class="bg-primary text-on-primary rounded-full p-3 shadow-[0_0_15px_rgba(74,222,128,0.4)] hover:bg-white/10 transition-colors active:translate-y-[1px] cubic-bezier(0.175,0.885,0.32,1.1) flex items-center justify-center relative group">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timer</span>
<!-- Tooltip -->
<span class="absolute -top-10 bg-surface-container-high text-text-primary font-label-sm text-label-sm px-3 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-whisper-border">Timer</span>
</button>
<!-- Music -->
<button aria-label="Music" class="text-on-surface-variant p-3 hover:bg-white/10 transition-colors active:translate-y-[1px] cubic-bezier(0.175,0.885,0.32,1.1) rounded-full flex items-center justify-center relative group">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">music_note</span>
<span class="absolute -top-10 bg-surface-container-high text-text-primary font-label-sm text-label-sm px-3 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-whisper-border">Music</span>
</button>
<!-- Focus (Tasks) -->
<button aria-label="Focus" class="text-on-surface-variant p-3 hover:bg-white/10 transition-colors active:translate-y-[1px] cubic-bezier(0.175,0.885,0.32,1.1) rounded-full flex items-center justify-center relative group">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">self_improvement</span>
<span class="absolute -top-10 bg-surface-container-high text-text-primary font-label-sm text-label-sm px-3 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-whisper-border">Focus</span>
</button>
<!-- Menu (Vibe/Mixer) -->
<button aria-label="Menu" class="text-on-surface-variant p-3 hover:bg-white/10 transition-colors active:translate-y-[1px] cubic-bezier(0.175,0.885,0.32,1.1) rounded-full flex items-center justify-center relative group">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
<span class="absolute -top-10 bg-surface-container-high text-text-primary font-label-sm text-label-sm px-3 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-whisper-border">Menu</span>
</button>
</div>
</nav>
<script>
        // Micro-interaction for timer hover
        const timerContainer = document.querySelector('.relative.flex.items-center');
        if(timerContainer) {
            timerContainer.addEventListener('mouseenter', () => {
                timerContainer.style.transform = 'scale(1.01)';
                timerContainer.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1)';
            });
            timerContainer.addEventListener('mouseleave', () => {
                timerContainer.style.transform = 'scale(1)';
            });
        }
    </script>
</body></html>
