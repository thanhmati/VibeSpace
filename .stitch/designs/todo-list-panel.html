<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VibeSpace Todo List Panel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "active-glow": "rgba(74, 222, 128, 0.15)",
                        "text-secondary": "#94a3b8",
                        "surface-container-high": "#242c25",
                        "primary": "#6bfb9a",
                        "secondary-fixed-dim": "#c4c7cb",
                        "on-secondary": "#2d3134",
                        "on-primary": "#003919",
                        "outline": "#869486",
                        "primary-container": "#4ade80",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        "inverse-surface": "#dde5da",
                        "canvas-base": "#090d10",
                        "on-tertiary-fixed-variant": "#6c3a0f",
                        "on-primary-fixed": "#00210c",
                        "tertiary-fixed-dim": "#ffb784",
                        "on-surface": "#dde5da",
                        "on-error-container": "#ffdad6",
                        "inverse-on-surface": "#2b322b",
                        "on-tertiary-container": "#794418",
                        "whisper-border": "rgba(255, 255, 255, 0.08)",
                        "on-tertiary": "#4f2500",
                        "secondary-container": "#43474b",
                        "surface-dim": "#0e150f",
                        "surface-container": "#1a211b",
                        "surface-tint": "#4de082",
                        "surface-variant": "#2f372f",
                        "background": "#0e150f",
                        "tertiary-fixed": "#ffdcc6",
                        "on-primary-container": "#005e2d",
                        "tertiary": "#ffd9c1",
                        "inverse-primary": "#006d36",
                        "surface-container-low": "#161d17",
                        "on-secondary-fixed": "#181c1f",
                        "surface-container-highest": "#2f372f",
                        "on-background": "#dde5da",
                        "on-tertiary-fixed": "#301400",
                        "glass-surface": "rgba(15, 23, 42, 0.45)",
                        "surface-bright": "#333b34",
                        "text-primary": "#f8fafc",
                        "surface-container-lowest": "#09100a",
                        "primary-fixed": "#6dfe9c",
                        "primary-fixed-dim": "#4de082",
                        "on-primary-fixed-variant": "#005227",
                        "tertiary-container": "#ffb47f",
                        "error": "#ffb4ab",
                        "on-surface-variant": "#bccabb",
                        "surface": "#0e150f",
                        "secondary-fixed": "#e0e3e7",
                        "on-secondary-fixed-variant": "#43474b",
                        "secondary": "#c4c7cb",
                        "on-secondary-container": "#b2b5ba",
                        "outline-variant": "#3d4a3e"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        "2xl": "1.25rem",
                        full: "9999px"
                    },
                    spacing: {
                        "container-todo": "400px",
                        "container-music": "360px",
                        "fab-size": "48px",
                        "section-gap": "2rem",
                        "inner-padding": "1.5rem"
                    },
                    fontFamily: {
                        "display-timer": ["JetBrains Mono"],
                        "h2": ["Outfit"],
                        "h1": ["Outfit"],
                        "body-md": ["Outfit"],
                        "mono-label": ["JetBrains Mono"],
                        "label-sm": ["Outfit"],
                        "body-lg": ["Outfit"],
                        "display-timer-mobile": ["JetBrains Mono"]
                    },
                    fontSize: {
                        "display-timer": ["80px", { lineHeight: "1", letterSpacing: "-0.02em", fontWeight: "500" }],
                        "h2": ["24px", { lineHeight: "1.3", fontWeight: "500" }],
                        "h1": ["32px", { lineHeight: "1.2", fontWeight: "600" }],
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "mono-label": ["12px", { lineHeight: "1", fontWeight: "400" }],
                        "label-sm": ["14px", { lineHeight: "1.4", letterSpacing: "0.01em", fontWeight: "500" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "display-timer-mobile": ["48px", { lineHeight: "1", fontWeight: "500" }]
                    },
                    boxShadow: {
                        'glass-ambient': '0 8px 32px 0 rgba(0, 0, 0, 0.3)',
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.1)',
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
<body class="bg-canvas-base text-text-primary font-body-md min-h-screen overflow-hidden selection:bg-primary-container selection:text-on-primary">
<!-- Atmospheric Background -->
<div class="fixed inset-0 z-0 pointer-events-none">
<img alt="Atmospheric rainy forest cabin scene" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/AP1WRLtk7JyIKn0jarZVchY_jsopYEOD3rNWobD2WTdmrKSAy26ql5_YkvXJOkxo4mHg5le-hOG5LOnuBptGp7ryUFKyVEcen_VgTg90TU3XEIjtzD07Yqdgdbpe-_FQq5R5JDAn6WGR7yYOwYCzVyYofsHkSl4Ighy_m3OiNwWrAO2aIMj24IMDNSVBgVoKo6PKqK9w4EXUOfUs3zt86gArfI5G4Eyk047IJj69ES3PUpHW0yd2yFoGNPEwOQ"/>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full h-screen flex items-center justify-center p-4">
<!-- Todo List Panel -->
<div class="w-container-todo bg-glass-surface backdrop-blur-2xl saturate-150 border border-whisper-border rounded-2xl shadow-glass-ambient flex flex-col p-inner-padding gap-6 transform transition-all duration-300 ease-spring hover:scale-[1.01]">
<!-- Header -->
<div class="flex items-center justify-between">
<h2 class="font-h2 text-h2 text-text-primary tracking-tight">Daily Checklist</h2>
<button aria-label="Close panel" class="text-text-secondary hover:text-text-primary transition-colors ease-spring duration-200 hover:rotate-90">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<!-- Progress Section -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center font-mono-label text-mono-label text-text-secondary">
<span>Progress</span>
<span>2 / 4 Completed</span>
</div>
<div class="w-full h-1.5 bg-black/30 rounded-full overflow-hidden border border-whisper-border/50">
<div class="h-full bg-primary-container rounded-full transition-all duration-500 ease-spring w-1/2"></div>
</div>
</div>
<!-- Task List -->
<div class="flex flex-col gap-3">
<!-- Checked Task 1 -->
<label class="group flex items-start gap-3 cursor-pointer p-2 -mx-2 rounded-lg hover:bg-white/5 transition-colors duration-200">
<div class="relative flex items-center justify-center w-5 h-5 mt-0.5 shrink-0">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 rounded-full border border-primary-container bg-primary-container/20 flex items-center justify-center transition-all duration-200">
<span class="material-symbols-outlined filled text-[14px] text-primary-container opacity-100 scale-100 transition-all duration-200">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-text-secondary line-through group-hover:text-text-secondary/80 transition-colors">Review project requirements</span>
</label>
<!-- Checked Task 2 -->
<label class="group flex items-start gap-3 cursor-pointer p-2 -mx-2 rounded-lg hover:bg-white/5 transition-colors duration-200">
<div class="relative flex items-center justify-center w-5 h-5 mt-0.5 shrink-0">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 rounded-full border border-primary-container bg-primary-container/20 flex items-center justify-center transition-all duration-200">
<span class="material-symbols-outlined filled text-[14px] text-primary-container opacity-100 scale-100 transition-all duration-200">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-text-secondary line-through group-hover:text-text-secondary/80 transition-colors">Write technical architecture docs</span>
</label>
<!-- Unchecked Task 3 -->
<label class="group flex items-start gap-3 cursor-pointer p-2 -mx-2 rounded-lg hover:bg-white/5 transition-colors duration-200">
<div class="relative flex items-center justify-center w-5 h-5 mt-0.5 shrink-0">
<input class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 rounded-full border border-whisper-border flex items-center justify-center group-hover:border-primary-container/50 transition-all duration-200">
<span class="material-symbols-outlined filled text-[14px] text-primary-container opacity-0 scale-50 transition-all duration-200">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-text-primary group-hover:text-primary transition-colors">Scaffold React Vite application</span>
</label>
<!-- Unchecked Task 4 -->
<label class="group flex items-start gap-3 cursor-pointer p-2 -mx-2 rounded-lg hover:bg-white/5 transition-colors duration-200">
<div class="relative flex items-center justify-center w-5 h-5 mt-0.5 shrink-0">
<input class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 rounded-full border border-whisper-border flex items-center justify-center group-hover:border-primary-container/50 transition-all duration-200">
<span class="material-symbols-outlined filled text-[14px] text-primary-container opacity-0 scale-50 transition-all duration-200">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-text-primary group-hover:text-primary transition-colors">Design components in Google Stitch</span>
</label>
</div>
<!-- Input Section -->
<div class="mt-2 flex items-center gap-3 relative">
<div class="flex-1 relative">
<input class="w-full bg-black/30 border border-whisper-border rounded-xl py-3 px-4 font-body-md text-body-md text-text-primary placeholder:text-text-secondary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:ring-opacity-50 transition-all duration-200" placeholder="Add a new task..." type="text"/>
</div>
<button aria-label="Add task" class="w-10 h-10 rounded-full bg-primary-container text-canvas-base flex items-center justify-center hover:bg-primary transition-colors duration-200 active:scale-95 active:translate-y-[1px] shrink-0">
<span class="material-symbols-outlined font-bold text-xl">add</span>
</button>
</div>
</div>
</main>
</body></html>
