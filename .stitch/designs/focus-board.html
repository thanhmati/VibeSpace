<style>
        .glass-panel {
            backdrop-filter: blur(24px) saturate(180%);
            background-color: theme('colors.glass-surface');
            border: 1px solid theme('colors.whisper-border');
        }
        .timer-ring {
            stroke-dasharray: 880;
            stroke-dashoffset: 220;
            transition: stroke-dashoffset 1s linear;
        }
        @keyframes pulse-ring {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .active-session .progress-svg {
            animation: pulse-ring 4s infinite cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        @keyframes visualizer {
            0%, 100% { height: 4px; }
            50% { height: 16px; }
        }
        .bar {
            animation: visualizer 1s infinite ease-in-out;
        }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.1s; }
        
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: theme('colors.primary');
            cursor: pointer;
            margin-top: -6px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        input[type=range]:hover::-webkit-slider-thumb {
            opacity: 1;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: theme('colors.whisper-border');
            border-radius: 2px;
        }
    </style>
</head>
