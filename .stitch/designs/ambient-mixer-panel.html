<style>
        .glass-panel {
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(15, 23, 42, 0.45);
        }
        
        .custom-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
        }
        
        .custom-slider:hover::-webkit-slider-thumb {
            opacity: 1;
        }
        
        .custom-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            border: none;
        }
        
        .custom-slider:hover::-moz-range-thumb {
            opacity: 1;
        }
        
        .toggle-checkbox:checked {
            right: 0;
            border-color: #4ade80;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #4ade80;
        }
    </style>
</head>

<script>
        // Simple script to update slider visual track on input
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            slider.addEventListener('input', function() {
                const value = this.value;
                this.style.background = `linear-gradient(to right, #4ade80 ${value}%, rgba(255, 255, 255, 0.1) ${value}%)`;
                // Update sibling numeric value if exists
                const valueDisplay = this.parentElement.querySelector('.text-mono-label');
                if(valueDisplay) valueDisplay.textContent = `${value}%`;
                
                // Auto toggle on if sliding up from 0
                const toggle = this.parentElement.querySelector('input[type="checkbox"]');
                if(toggle && value > 0 && !toggle.checked) {
                    toggle.checked = true;
                    this.parentElement.classList.remove('opacity-50');
                    const icon = this.parentElement.querySelector('.material-symbols-outlined');
                    icon.classList.add('text-primary-container');
                    icon.parentElement.classList.remove('text-text-secondary');
                    icon.parentElement.classList.add('text-text-primary');
                }
            });
        });
    </script>
