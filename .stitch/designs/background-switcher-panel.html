<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4ade80;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        input[type=range]:hover::-webkit-slider-thumb,
        input[type=range]:focus::-webkit-slider-thumb {
            opacity: 1;
        }

        input[type=range]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4ade80;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease;
            border: none;
        }
        
        input[type=range]:hover::-moz-range-thumb,
        input[type=range]:focus::-moz-range-thumb {
            opacity: 1;
        }
    </style>

<div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition-colors duration-300"></div>
<div class="absolute bottom-2 left-2 right-2 text-left">
<span class="font-mono-label text-mono-label text-slate-300 group-hover:text-white transition-colors">Quiet Room</span>
</div>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center gap-8 px-inner-padding pb-6 pt-4 bg-transparent backdrop-blur-2xl saturate-180 bg-glass-surface border-t border-whisper-border shadow-[0_-8px_32px_0_rgba(0,0,0,0.3)] rounded-t-xl md:hidden">

<script>
        // Simple script to update range slider background if needed for more complex styling,
        // though basic styling is handled in the CSS above for minimalism.
        const opacitySlider = document.querySelector('input[type="range"]');
        const opacityValue = opacitySlider.parentElement.previousElementSibling.querySelector('span');

        opacitySlider.addEventListener('input', (e) => {
            opacityValue.textContent = `${e.target.value}%`;
            // In a real app, this would update the CSS variable or inline style of the card's background
        });
    </script>
