<style>
        .glass-panel {
            background-color: theme('colors.glass-surface');
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid theme('colors.whisper-border');
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .visualizer-bar {
            width: 3px;
            background-color: theme('colors.primary-container');
            border-radius: 2px;
            animation: equalize 1s infinite ease-in-out;
            transform-origin: bottom;
        }

        .visualizer-bar:nth-child(1) { animation-delay: -0.4s; height: 10px; }
        .visualizer-bar:nth-child(2) { animation-delay: -0.2s; height: 16px; }
        .visualizer-bar:nth-child(3) { animation-delay: 0s; height: 12px; }

        @keyframes equalize {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        .btn-primary {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .btn-primary:active {
            transform: translateY(1px);
        }

        input[type="text"]:focus {
            box-shadow: 0 0 0 1px theme('colors.primary-container'), 0 0 10px theme('colors.active-glow');
        }
    </style>
</head>
<body class="bg-canvas-base text-text-primary min-h-screen flex flex-col font-body-md overflow-hidden antialiased">
<!-- Global Background Context -->
<div aria-hidden="true" class="fixed inset-0 z-[-1] bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida/AP1WRLtk7JyIKn0jarZVchY_jsopYEOD3rNWobD2WTdmrKSAy26ql5_YkvXJOkxo4mHg5le-hOG5LOnuBptGp7ryUFKyVEcen_VgTg90TU3XEIjtzD07Yqdgdbpe-_FQq5R5JDAn6WGR7yYOwYCzVyYofsHkSl4Ighy_m3OiNwWrAO2aIMj24IMDNSVBgVoKo6PKqK9w4EXUOfUs3zt86gArfI5G4Eyk047IJj69ES3PUpHW0yd2yFoGNPEwOQ');"></div>
<div aria-hidden="true" class="fixed inset-0 z-[-1] bg-black/30 backdrop-blur-sm"></div>
<!-- Main Container (Zen Centered) -->
<main class="flex-grow flex items-center justify-center p-4">
<!-- Lofi Music Panel -->
<section class="glass-panel w-container-music rounded-2xl overflow-hidden flex flex-col transform transition-all duration-300">
<!-- Header -->
<div class="flex items-center justify-between p-inner-padding pb-4 border-b border-whisper-border">
<h2 class="font-h2 text-text-primary m-0">Lofi Music</h2>

<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<div class="p-inner-padding flex flex-col gap-section-gap overflow-y-auto custom-scrollbar">
<!-- Section 1: Now Playing -->
<div class="flex flex-col gap-4">
<h3 class="font-label-sm text-text-secondary uppercase tracking-wider mb-2">Now Playing</h3>
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 border border-whisper-border shadow-lg">
<img alt="Lofi cover art showing rainy window in Tokyo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBZR74iSE1uiOczrhPFVU56qhjv3DsUG7CRLInXhFzxrTA3PIyrPkOo7rUR78krXcXfhGvKIXkOQSXWYO9c3H5VPRrmjwcxsiXkzAfup9Mbiqw8xswNESWwbMiyAgTt6sTytxt6MQhu-eObg7pAjpHCBlfN__-z_p_Y90gLV02FCAE6gbqg1v_-TLQxGFQWrkkFbamU9M27-bpXBrWchRsLkEkBSwcdhtVSChS2Jxk8RZ8GzgUPvjIeB7S3z0R9VAgfSONa06SUpck"/>
</div>
<div class="flex-grow min-w-0">
<h4 class="font-label-sm text-text-primary truncate">Rainy Night in Tokyo</h4>
<p class="font-mono-label text-text-secondary truncate mt-1">Lofi Girl</p>
</div>
</div>
<!-- Progress Bar -->

</button>
<button class="text-text-primary bg-white/5 hover:bg-white/10 transition-colors p-3 rounded-full focus:outline-none border border-whisper-border shadow-lg active:scale-95">

</div>
<div class="flex items-end h-4 gap-[2px] opacity-100 transition-opacity">
<div class="visualizer-bar"></div>
<div class="visualizer-bar"></div>
<div class="visualizer-bar"></div>
</div>
</button>
</li>
<!-- Inactive Stream 1 -->
<li>

<div class="flex items-center gap-3 truncate">
<div class="w-2 h-2 rounded-full bg-transparent"></div>
<span class="font-label-sm text-text-secondary group-hover:text-text-primary transition-colors truncate">Chillhop Café Radio</span>
</div>
</button>
</li>
<!-- Inactive Stream 2 -->

                            Add

</div>
</section>
